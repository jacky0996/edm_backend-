services:
  # PHP 應用程式
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: edm-backend-image
    container_name: edm-backend-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      TZ: Asia/Taipei
    networks:
      - backend

  # Nginx Web 伺服器
  nginx:
    image: nginx:alpine
    container_name: edm-nginx
    restart: unless-stopped
    ports:
      - "81:80"
    volumes:
      - .:/var/www
      - ./docker-compose/nginx/default.conf:/etc/nginx/conf.d/default.conf
    environment:
      TZ: Asia/Taipei
    depends_on:
      - app
    networks:
      - backend

  # MySQL 8.4 資料庫
  db:
    image: mysql:8.4
    container_name: edm-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: edm_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: edm_user
      MYSQL_PASSWORD: edm_password
      TZ: Asia/Taipei
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  dbdata:
    driver: local
