# Local Development Override
services:
  # PHP 應用程式：開發模式 (包含熱更新與頻繁的重新整理)
  app:
    image: edm-backend-image:local
    volumes:
      - .:/var/www
    extra_hosts:                   # 允許容器透過 host.docker.internal 存取您的電腦主機
      - "host.docker.internal:host-gateway"
    environment:
      - APP_DEBUG=true
      - APP_ENV=local
      - LOG_LEVEL=debug
      - HWS_VERIFY_URL=http://host.docker.internal:8000/api/edm/sso/verify-token
    networks:
      - backend

  # Nginx：使用最寬鬆的設定檔 (default.conf)
  nginx:
    volumes:
      - .:/var/www
      - ./docker-compose/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "81:80"
    depends_on:
      - app
    networks:
      - backend

  # MySQL：開發模式，必須露出 3306 方便開發人員登入
  db:
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
    networks:
      - backend
